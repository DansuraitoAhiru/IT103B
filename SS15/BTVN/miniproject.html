<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Công Việc - Todo List</title>
    <link rel="stylesheet" href="miniproject.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1>📝 Quản Lý Công Việc</h1>
        <div class="input-group">
          <input
            type="text"
            id="taskInput"
            placeholder="Nhập công việc mới..."
            autocomplete="off"
          />
          <button id="addBtn" class="btn-add">Thêm</button>
        </div>
      </header>

      <!-- Body - Task List -->
      <main class="task-list" id="taskList">
        <!-- Tasks will be dynamically added here -->

        <div class="task-item" data-id="2">
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <div class="task-counter">
          <span id="completedCount">0</span> /
          <span id="totalCount">0</span> công việc hoàn thành
        </div>
        <div id="completionStatus"></div>
      </footer>
    </div>
    <script src="./miniproject.js"></script>
  </body>
</html>
