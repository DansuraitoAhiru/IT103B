<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberpunk Toast</title>
  <link rel="stylesheet" href="nv2.css">
</head>
<body>

<h1 class="title">TOAST</h1>
<p class="subtitle">NOTIFICATION SYSTEM</p>

<div class="buttons">
  <button onclick="createToast('success')" id="success">SUCCESS</button>
  <button onclick="createToast('error')" id="error">ERROR</button>
  <button onclick="createToast('info')" id="info">INFO</button>
  <button onclick="createToast('warning')" id="warning">WARNING</button>
</div>

<div id="toast-container"></div>

<script src="nv2.js"></script>
</body>
</html>
