<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 6</title>
</head>
<body>
    <h1 style="text-transform: capitalize;">Danh sách sản phảm chợ Tết</h1>
    <ul id="product-list">
        <!-- Danh sách sản phẩm -->
    </ul>
    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit">Thêm sản phẩm</button> <br> <br>
        <input type="text" id="search-input" placeholder="Tìm sản phẩm..."> <br> <br>
    </form>

    <div class="sort-controls">
        <button id="sort-asc">Sắp xếp giá: Thấp → Cao</button>
        <button id="sort-desc">Sắp xếp giá: Cao → Thấp</button>
    </div>
    <script src="./bai6.js"></script>
</body>
</html>
